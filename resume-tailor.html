<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Tailor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: #2a2a2e;
    --border2: #3a3a3f;
    --text: #e8e8ea;
    --text2: #9090a0;
    --text3: #55555f;
    --accent: #7c6aff;
    --accent2: #a594ff;
    --green: #4ade80;
    --red: #f87171;
    --amber: #fbbf24;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Layout */
  .app { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent2);
    letter-spacing: 0.05em;
  }

  .logo span { color: var(--text3); }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    margin-left: auto;
    transition: background 0.3s;
  }
  .status-dot.ready { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.loading { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--red); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .status-label { font-family: var(--mono); font-size: 11px; color: var(--text2); }

  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    height: calc(100vh - 57px);
    overflow: hidden;
  }

  /* Panels */
  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .panel-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  /* Input section */
  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .field input, .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
    resize: none;
  }

  .field input:focus, .field textarea:focus {
    border-color: var(--accent);
  }

  .field textarea {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    min-height: 220px;
  }

  /* API Key row */
  .key-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .key-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .key-row input:focus { border-color: var(--accent); }

  .key-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text3);
    white-space: nowrap;
  }
  .key-badge.set { border-color: var(--green); color: var(--green); }

  /* Buttons */
  .btn {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    width: 100%;
    justify-content: center;
    font-size: 13px;
    padding: 12px;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--border2); color: var(--text); }

  /* Output area */
  .output-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text3);
  }

  .output-placeholder .icon {
    font-size: 32px;
    opacity: 0.3;
  }

  .output-placeholder p {
    font-family: var(--mono);
    font-size: 12px;
    text-align: center;
    line-height: 1.8;
  }

  .output-content { display: none; flex-direction: column; gap: 16px; height: 100%; }
  .output-content.visible { display: flex; }

  /* Result card */
  .result-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .result-card-header {
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-card-header span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }

  .result-card-body {
    padding: 14px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.7;
    color: var(--text2);
    max-height: 140px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* Tag pills */
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

  .tag {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
  }
  .tag.highlight {
    background: rgba(124,106,255,0.12);
    border-color: rgba(124,106,255,0.4);
    color: var(--accent2);
  }

  /* Version badge */
  .version-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 100px;
    border: 1px solid;
  }
  .version-badge.csharp { border-color: rgba(124,106,255,0.5); color: var(--accent2); background: rgba(124,106,255,0.08); }
  .version-badge.python { border-color: rgba(74,222,128,0.5); color: var(--green); background: rgba(74,222,128,0.08); }
  .version-badge.java { border-color: rgba(251,191,36,0.5); color: var(--amber); background: rgba(251,191,36,0.08); }

  /* Download section */
  .download-section {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  .btn-download {
    flex: 1;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.3);
    color: var(--green);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-download:hover { background: rgba(74,222,128,0.18); transform: translateY(-1px); }
  .btn-download:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* Loading spinner */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error/info messages */
  .msg {
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 14px;
    border-radius: 6px;
    margin-top: 12px;
    line-height: 1.6;
  }
  .msg.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
  .msg.info { background: rgba(124,106,255,0.1); border: 1px solid rgba(124,106,255,0.3); color: var(--accent2); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Analysis section */
  .analysis-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
  }
  .analysis-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    min-width: 80px;
    padding-top: 2px;
  }
  .analysis-value { flex: 1; }
</style>
</head>

<div class="app">
  <header>
    <div class="logo">resume<span>/</span>tailor</div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:8px;">× oh-my-cv</div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
      <span class="status-label" id="statusLabel">waiting</span>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </header>

  <main>
    <!-- LEFT: Input -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">input</span>
      </div>
      <div class="panel-body">

        <!-- API Key -->
        <div class="key-row">
          <input type="password" id="apiKey" placeholder="Gemini API key  (AIza...)" oninput="checkKey()">
          <span class="key-badge" id="keyBadge">no key</span>
        </div>

        <div class="field">
          <label>Job Title</label>
          <input type="text" id="jobTitle" placeholder="e.g. Full-Stack Developer">
        </div>

        <div class="field">
          <label>Company</label>
          <input type="text" id="company" placeholder="e.g. Atlassian">
        </div>

        <div class="field">
          <label>Job Description</label>
          <textarea id="jd" placeholder="Paste the full JD here..."></textarea>
        </div>

        <button class="btn btn-primary" id="runBtn" onclick="runTailor()" disabled>
          <span id="btnText">tailor resume</span>
        </button>

        <div id="errorMsg"></div>
      </div>
    </div>

    <!-- RIGHT: Output -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">output</span>
        <span id="outputMeta" style="font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto;"></span>
      </div>
      <div class="panel-body" style="display:flex;flex-direction:column;">

        <div class="output-placeholder" id="placeholder">
          <div class="icon">◈</div>
          <p>paste a JD on the left<br>and hit tailor resume</p>
        </div>

        <div class="output-content" id="outputContent">

          <div class="analysis-row">
            <span class="analysis-label">version</span>
            <div class="analysis-value">
              <span class="version-badge" id="versionBadge">—</span>
            </div>
          </div>

          <div class="analysis-row">
            <span class="analysis-label">detected</span>
            <div class="analysis-value">
              <div class="tag-list" id="detectedTags"></div>
            </div>
          </div>

          <div class="analysis-row">
            <span class="analysis-label">bolded</span>
            <div class="analysis-value">
              <div class="tag-list" id="boldedTags"></div>
            </div>
          </div>

          <div class="result-card">
            <div class="result-card-header">
              <span>markdown preview</span>
              <button class="btn btn-secondary" style="padding:4px 10px;font-size:11px;" onclick="copyMarkdown()">copy md</button>
            </div>
            <div class="result-card-body" id="mdPreview"></div>
          </div>

          <div class="download-section">
            <button class="btn-download" id="dlBtn" onclick="downloadJSON()">
              ↓ download  oh-my-cv .json
            </button>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>

// ── State ─────────────────────────────────────────────────────────────────
let resultData = null;

function checkKey() {
  const key = document.getElementById('apiKey').value.trim();
  const badge = document.getElementById('keyBadge');
  const btn = document.getElementById('runBtn');
  if (key.startsWith('AIza') && key.length > 20) {
    badge.textContent = 'set ✓';
    badge.className = 'key-badge set';
    btn.disabled = false;
    setStatus('ready', 'ready');
  } else {
    badge.textContent = 'no key';
    badge.className = 'key-badge';
    btn.disabled = true;
    setStatus('', 'waiting');
  }
}

function setStatus(state, label) {
  const dot = document.getElementById('statusDot');
  const lbl = document.getElementById('statusLabel');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
  lbl.textContent = label;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.innerHTML = `<div class="msg error">${msg}</div>`;
}

function clearError() {
  document.getElementById('errorMsg').innerHTML = '';
}

async function runTailor() {
  const key = document.getElementById('apiKey').value.trim();
  const title = document.getElementById('jobTitle').value.trim();
  const company = document.getElementById('company').value.trim();
  const jd = document.getElementById('jd').value.trim();

  if (!jd) { showError('Please paste a job description.'); return; }
  clearError();

  const btn = document.getElementById('runBtn');
  const btnText = document.getElementById('btnText');
  btn.disabled = true;
  btnText.innerHTML = '<div class="spinner"></div> analysing...';
  setStatus('loading', 'processing');

  const prompt = `You are a resume tailoring assistant. Given a job description, you must:

1. Decide which resume template to use: "csharp", "python", or "java" — based on what the JD primarily requires for backend.
2. Extract all technical skills/tools mentioned in the JD.
3. Rewrite the Skills section of the chosen template so that skills matching the JD appear first and are bolded with **bold**. Keep ALL existing skills — just reorder and re-bold them.
4. In the Experience bullet points, if a generic term can be replaced with the specific framework the JD wants (e.g. "web framework" → the actual one), do so. Keep all other bullet points exactly as-is. Do not add or remove bullet points.
5. Return ONLY valid JSON, no markdown, no explanation.

JSON format:
{
  "template": "csharp" | "python" | "java",
  "detected_skills": ["skill1", "skill2", ...],
  "bolded_skills": ["skill1", "skill2", ...],
  "skills_section": "Programming Languages: **X**, Y, Z\\n\\nFront-end: ...",
  "updated_markdown": "...full updated markdown..."
}

Job Title: ${title || 'Not specified'}
Company: ${company || 'Not specified'}

Job Description:
${jd}`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.2, maxOutputTokens: 4096 }
        })
      }
    );

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `API error ${res.status}`);
    }

    const data = await res.json();
    let raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    raw = raw.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();

    const parsed = JSON.parse(raw);
    const tmpl = TEMPLATES[parsed.template] || TEMPLATES.csharp;

    // Build new markdown
    const newMarkdown = parsed.updated_markdown || tmpl.markdown;

    resultData = {
      template: parsed.template,
      detected: parsed.detected_skills || [],
      bolded: parsed.bolded_skills || [],
      markdown: newMarkdown,
      templateObj: tmpl,
      company: company || 'company',
      title: title || 'role'
    };

    showOutput(resultData);
    setStatus('ready', 'done');

  } catch (e) {
    showError(e.message || 'Something went wrong.');
    setStatus('error', 'error');
  }

  btn.disabled = false;
  btnText.textContent = 'tailor resume';
  checkKey();
}

function showOutput(d) {
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('outputContent').classList.add('visible');

  // Version badge
  const badge = document.getElementById('versionBadge');
  badge.textContent = d.template;
  badge.className = 'version-badge ' + d.template;

  // Detected skills
  const det = document.getElementById('detectedTags');
  det.innerHTML = d.detected.map(s => `<span class="tag">${s}</span>`).join('');

  // Bolded skills
  const bold = document.getElementById('boldedTags');
  bold.innerHTML = d.bolded.map(s => `<span class="tag highlight">**${s}**</span>`).join('');

  // MD preview
  document.getElementById('mdPreview').textContent = d.markdown;

  // Meta
  document.getElementById('outputMeta').textContent =
    d.company ? `${d.company} · ${d.title}` : '';
}

function copyMarkdown() {
  if (!resultData) return;
  navigator.clipboard.writeText(resultData.markdown);
}

function downloadJSON() {
  if (!resultData) return;
  const ts = Date.now().toString();
  const name = `${resultData.company} (${resultData.title})`.replace(/[^\w\s()-]/g, '');

  const output = {
    version: "v1",
    data: {
      [ts]: {
        updated_at: ts,
        created_at: ts,
        name: name,
        markdown: resultData.markdown,
        css: resultData.templateObj.css,
        styles: resultData.templateObj.styles
      }
    }
  };

  const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `resume-${name.replace(/\s+/g, '-').toLowerCase()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
