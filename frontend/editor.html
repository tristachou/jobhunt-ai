<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor — Job Application Tracking System</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f0f0;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      background: #1a1a2e;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .topbar-back {
      color: #ccc;
      text-decoration: none;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .topbar-back:hover {
      color: #fff;
    }

    .topbar-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.95rem;
    }

    .topbar-title span {
      color: #aaa;
      margin: 0 6px;
    }

    .score-badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 10px;
      background: #e8f5e9;
      color: #2e7d32;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .score-badge.low {
      background: #fff3e0;
      color: #e65100;
    }

    .score-badge.mid {
      background: #fff8e1;
      color: #f57f17;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-download {
      padding: 6px 14px;
      border-radius: 5px;
      border: none;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      background: #fff;
      color: #1a1a2e;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: opacity .15s;
    }

    .btn-download:hover {
      opacity: .8;
    }

    .btn-download:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      background: #e8e8e8;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }

    .tab {
      padding: 8px 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      color: #777;
      border-bottom: 2px solid transparent;
      font-family: inherit;
    }

    .tab.active {
      color: #1a1a2e;
      border-bottom-color: #1a1a2e;
      background: #f5f5f5;
    }

    /* ── Editor + Preview ── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      min-height: 0;
      gap: 0;
    }

    .editor-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ddd;
      background: #fff;
      min-height: 0;
    }

    .editor-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #fafafa;
      border-bottom: 1px solid #eee;
      font-size: 0.75rem;
      color: #888;
      flex-shrink: 0;
    }

    .save-indicator {
      transition: color .2s;
    }

    .save-indicator.saving {
      color: #f59e0b;
    }

    .save-indicator.saved {
      color: #22c55e;
    }

    .editor-textarea {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      padding: 16px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      color: #222;
      background: #fff;
      tab-size: 2;
    }

    .preview-pane {
      display: flex;
      flex-direction: column;
      background: #e8e8e8;
      min-height: 0;
    }

    .preview-label {
      padding: 6px 12px;
      font-size: 0.75rem;
      color: #888;
      background: #fafafa;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }

    .preview-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <a href="/" class="topbar-back">← Back</a>
    <div class="topbar-title" id="topbar-title">Loading…</div>
    <span class="score-badge" id="score-badge" style="display:none"></span>
    <div class="topbar-actions">
      <button class="btn-download" id="btn-resume" disabled>⬇ Resume PDF</button>
      <button class="btn-download" id="btn-cover" disabled>⬇ Cover Letter PDF</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="resume">Resume</button>
    <button class="tab" data-tab="coverletter">Cover Letter</button>
  </div>

  <div class="workspace">
    <div class="editor-pane">
      <div class="editor-toolbar">
        <span>Markdown editor — changes auto-save</span>
        <span class="save-indicator" id="save-indicator">—</span>
      </div>
      <textarea class="editor-textarea" id="editor-textarea" spellcheck="false"></textarea>
    </div>

    <div class="preview-pane">
      <div class="preview-label">Preview (HTML render)</div>
      <iframe class="preview-frame" id="preview-frame" sandbox="allow-same-origin"></iframe>
    </div>
  </div>

  <script src="editor.js"></script>
</body>

</html>
